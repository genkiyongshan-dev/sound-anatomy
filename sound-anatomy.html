<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sound anatomy</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#08080d;--surface:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.04);
    --border-light:rgba(255,255,255,0.06);--text:#e0e0e8;--text-dim:rgba(255,255,255,0.45);
    --text-faint:rgba(255,255,255,0.25);--text-ghost:rgba(255,255,255,0.12);
    --accent:#4ECDC4;--accent-dim:rgba(78,205,196,0.1);--accent-border:rgba(78,205,196,0.18);
    --purple:#A78BFA;--red:#FF6B6B;--orange:#F97316;
  }
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono','Fira Code','Menlo',monospace;min-height:100vh;min-height:100dvh;overflow-y:auto;-webkit-font-smoothing:antialiased}
  .header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-light);background:var(--surface)}
  .header-title{font-size:13px;font-weight:700;letter-spacing:2.5px;color:#fff}
  .header-badges{display:flex;gap:5px}
  .badge{font-size:7px;padding:2px 5px;border-radius:2px;letter-spacing:0.5px}
  .badge-accent{background:var(--accent-dim);color:var(--accent)}
  .badge-dim{background:rgba(255,255,255,0.04);color:var(--text-faint)}
  .file-bar{display:flex;align-items:center;padding:5px 14px;gap:8px;border-bottom:1px solid var(--border)}
  .file-input{display:none}
  .btn-file{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-dim);font-size:8px;padding:3px 8px;border-radius:2px;cursor:pointer;font-family:inherit;letter-spacing:1px}
  .file-name{font-size:9px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .file-dur{font-size:8px;color:var(--text-faint)}
  .source-count{font-size:8px;color:var(--accent)}
  .progress-wrap{padding:0 14px}
  .progress-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s}
  .progress-label{font-size:8px;color:var(--text-faint);text-align:center;padding:4px 0}
  .spectrogram-wrap{padding:4px 6px 2px}
  .spectrogram-wrap canvas{border-radius:4px;display:block;width:100%}
  .transport{display:flex;align-items:center;padding:4px 14px;gap:8px;border-bottom:1px solid var(--border)}
  .btn-play{background:none;border:1px solid rgba(255,255,255,0.1);color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px}
  .transport-bar{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;cursor:pointer;position:relative}
  .transport-time{font-size:8px;color:var(--text-faint)}
  .section{padding:8px 14px;border-bottom:1px solid var(--border)}
  .section-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:6px}
  .control-row{display:flex;gap:8px}
  .control-box{flex:1;background:var(--surface);border-radius:3px;padding:7px 9px;border:1px solid rgba(255,255,255,0.035)}
  .control-header{display:flex;justify-content:space-between;margin-bottom:5px}
  .control-label{font-size:8px;color:var(--text-dim)}
  .control-value{font-size:8px}
  .control-footer{display:flex;justify-content:space-between;margin-top:2px}
  .control-hint{font-size:6px;color:rgba(255,255,255,0.15)}
  input[type="range"]{width:100%;height:2px;appearance:none;-webkit-appearance:none;border-radius:1px;outline:none;cursor:pointer;background:rgba(255,255,255,0.06)}
  input[type="range"]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
  .analysis-area{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border)}
  .radar-wrap{background:rgba(255,255,255,0.015);border-radius:3px;padding:4px;border:1px solid rgba(255,255,255,0.035);display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .source-list-wrap{flex:1;min-width:0;max-height:300px;overflow-y:auto}
  .source-empty{font-size:9px;color:var(--text-faint);padding:8px;text-align:center}
  .cat-header{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:2px;cursor:pointer;margin-bottom:1px}
  .cat-arrow{font-size:7px;opacity:0.5;transition:transform 0.15s}
  .cat-arrow.open{transform:rotate(90deg)}
  .cat-label{font-size:8px;flex:1}
  .cat-count{font-size:7px;color:var(--text-faint)}
  .btn-cat-all{background:rgba(255,255,255,0.05);border:none;color:var(--text-faint);font-size:6px;padding:1px 3px;border-radius:1px;cursor:pointer;font-family:inherit}
  .cat-sources{padding-left:8px;margin-top:1px}
  .source-row{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:2px;cursor:pointer;transition:all 0.1s;border:1px solid transparent}
  .source-row:hover{background:rgba(255,255,255,0.03)}
  .source-row.inactive{opacity:0.35}
  .source-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .source-name{font-size:9px;color:rgba(255,255,255,0.6);flex:1;min-width:0}
  .confidence-bar{width:20px;height:3px;background:rgba(255,255,255,0.05);border-radius:1px;flex-shrink:0}
  .confidence-fill{height:100%;border-radius:1px;opacity:0.5}
  .btn-ms{border:none;font-size:6px;padding:2px 4px;border-radius:1px;cursor:pointer;font-family:inherit;letter-spacing:0.5px}
  .actions{display:flex;gap:8px;padding:10px 14px}
  .btn-reanalyze{flex:1;padding:8px;background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:1.5px;font-weight:600}
  .btn-reanalyze:disabled{color:rgba(78,205,196,0.3);cursor:default}
  .btn-export{flex:1;padding:8px;border:none;border-radius:3px;cursor:pointer;font-size:9px;font-family:inherit;letter-spacing:1.5px;font-weight:700}
  .status{padding:3px 14px 6px;display:flex;justify-content:space-between}
  .status span{font-size:7px;letter-spacing:1px}
  .status-left{color:var(--text-ghost)}
  .status-right{color:rgba(255,255,255,0.08)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="header"><span class="header-title">sound anatomy</span><div class="header-badges" id="hBadges"></div></div>
<div class="file-bar"><input type="file" id="fIn" class="file-input" accept=".wav,.mp3,.ogg,.flac,.m4a,.aac"><button class="btn-file" onclick="document.getElementById('fIn').click()">ファイル選択</button><span class="file-name" id="fName"></span><span class="file-dur" id="fDur"></span><span class="source-count" id="sCnt"></span></div>
<div class="progress-wrap hidden" id="pWrap"><div class="progress-track"><div class="progress-fill" id="pFill"></div></div><div class="progress-label" id="pLabel"></div></div>
<div class="spectrogram-wrap"><canvas id="specCanvas"></canvas></div>
<div class="transport hidden" id="tBar"><button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button><div class="transport-bar" id="pBar" onclick="seekPB(event)"><div id="pProg" style="height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width 0.1s"></div></div><span class="transport-time" id="tTime"></span></div>
<div class="section"><div class="section-label">分離制御</div><div class="control-row"><div class="control-box"><div class="control-header"><span class="control-label">分離の細かさ</span><span class="control-value" style="color:var(--accent)" id="gVal">50%</span></div><input type="range" min="5" max="100" value="50" id="gSl" oninput="uGran(this.value)"><div class="control-footer"><span class="control-hint">粗い（少ない）</span><span class="control-hint">細かい（多い）</span></div></div><div class="control-box"><div class="control-header"><span class="control-label">信頼度しきい値</span><span class="control-value" style="color:var(--purple)" id="cVal">20%</span></div><input type="range" min="0" max="90" value="20" id="cSl" oninput="uConf(this.value)"><div class="control-footer"><span class="control-hint">全表示</span><span class="control-hint">高信頼のみ</span></div></div></div></div>
<div class="section"><div class="section-label">解析パラメータ</div><div id="pGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:5px"></div></div>
<div class="analysis-area"><div class="radar-wrap"><div class="section-label" style="margin-bottom:2px">方向</div><svg id="radar" width="100" height="100" viewBox="0 0 100 100"></svg></div><div class="source-list-wrap"><div class="section-label">音源グループ</div><div id="sList"></div></div></div>
<div class="actions"><button class="btn-reanalyze" id="btnRe" onclick="reanalyze()" disabled>再解析</button><button class="btn-export" id="btnEx" onclick="exportWAV()" style="background:rgba(78,205,196,0.15);color:rgba(78,205,196,0.4)">WAV書き出し</button></div>
<div class="status"><span class="status-left">sound anatomy — 音源構造分離</span><span class="status-right">v0.2</span></div>

<script>
const $=id=>document.getElementById(id);
const S={buf:null,actx:null,nodes:[],stft:null,sources:[],masks:null,rBufs:null,
  w:{harmonic:80,amplitude:60,waveform:50,direction:70},gran:50,cTh:20,
  expC:{harmonic:true,pattern:true,noise:true},sel:null,playing:false,pStart:0,pOff:0,
  left:null,right:null,ffts:2048,hop:512};
const COLS=["#4ECDC4","#FF6B6B","#FFE66D","#A78BFA","#F97316","#36B5A0","#FF8E72","#EC4899","#06B6D4","#84CC16","#8B7AE0","#FB923C"];
const CI={harmonic:{l:"調波音",i:"≋",c:"#4ECDC4"},pattern:{l:"反復パターン",i:"∿",c:"#FF6B6B"},noise:{l:"定常ノイズ",i:"░",c:"#A78BFA"}};
const PMS=[{id:"harmonic",l:"倍音構造",i:"≋"},{id:"amplitude",l:"音量パターン",i:"▲"},{id:"waveform",l:"波形反復",i:"∿"},{id:"direction",l:"方向性",i:"◎"}];

// DSP
function hWin(N){const w=new Float32Array(N);for(let i=0;i<N;i++)w[i]=.5*(1-Math.cos(2*Math.PI*i/(N-1)));return w}
function fftIP(re,im){const N=re.length;for(let i=1,j=0;i<N;i++){let b=N>>1;for(;j&b;b>>=1)j^=b;j^=b;if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]]}}for(let len=2;len<=N;len<<=1){const h=len>>1,a=-2*Math.PI/len,wR=Math.cos(a),wI=Math.sin(a);for(let i=0;i<N;i+=len){let cR=1,cI=0;for(let j=0;j<h;j++){const ai=i+j,bi=i+j+h,tR=cR*re[bi]-cI*im[bi],tI=cR*im[bi]+cI*re[bi];re[bi]=re[ai]-tR;im[bi]=im[ai]-tI;re[ai]+=tR;im[ai]+=tI;const nR=cR*wR-cI*wI;cI=cR*wI+cI*wR;cR=nR}}}}
function ifftIP(re,im){const N=re.length;for(let i=0;i<N;i++)im[i]=-im[i];fftIP(re,im);for(let i=0;i<N;i++){re[i]/=N;im[i]=-im[i]/N}}

function doSTFT(samp,fs,hs){const win=hWin(fs),nF=Math.floor((samp.length-fs)/hs)+1,nB=fs/2+1,mag=[],ph=[];for(let f=0;f<nF;f++){const o=f*hs,re=new Float32Array(fs),im=new Float32Array(fs);for(let i=0;i<fs;i++)re[i]=(samp[o+i]||0)*win[i];fftIP(re,im);const m=new Float32Array(nB),p=new Float32Array(nB);for(let i=0;i<nB;i++){m[i]=Math.sqrt(re[i]*re[i]+im[i]*im[i]);p[i]=Math.atan2(im[i],re[i])}mag.push(m);ph.push(p)}return{mag,ph,nF,nB,fs,hs}}

function doISTFT(mag,ph,fs,hs,oLen){const win=hWin(fs),out=new Float32Array(oLen),ws=new Float32Array(oLen),nB=fs/2+1;for(let f=0;f<mag.length;f++){const o=f*hs,re=new Float32Array(fs),im=new Float32Array(fs);for(let i=0;i<nB;i++){re[i]=mag[f][i]*Math.cos(ph[f][i]);im[i]=mag[f][i]*Math.sin(ph[f][i])}for(let i=nB;i<fs;i++){re[i]=re[fs-i];im[i]=-im[fs-i]}ifftIP(re,im);for(let i=0;i<fs;i++)if(o+i<oLen){out[o+i]+=re[i]*win[i];ws[o+i]+=win[i]*win[i]}}for(let i=0;i<oLen;i++)if(ws[i]>1e-8)out[i]/=ws[i];return out}

function findPks(m,th,sr,fs){const pks=[],N=m.length;for(let i=2;i<N-2;i++){if(m[i]>th&&m[i]>m[i-1]&&m[i]>m[i+1]&&m[i]>m[i-2]&&m[i]>m[i+2]){const a=Math.log(m[i-1]+1e-10),b=Math.log(m[i]+1e-10),g=Math.log(m[i+1]+1e-10),p=.5*(a-g)/(a-2*b+g);pks.push({bin:i,freq:((i+p)*sr)/fs,mag:m[i]})}}pks.sort((a,b)=>b.mag-a.mag);return pks.slice(0,30)}

function detectH(ppf,sr,fs,p){const{tol=.04,minH=3,minF=5}=p;const cs=new Map();ppf.forEach((pks,fi)=>{for(const pk of pks){if(pk.freq<60||pk.freq>4000)continue;let c=1;const mt=[pk];for(let h=2;h<=8;h++){const m=pks.find(p=>Math.abs(p.freq-pk.freq*h)/(pk.freq*h)<tol);if(m){c++;mt.push(m)}}if(c>=minH){const k=Math.round(pk.freq/10)*10;if(!cs.has(k))cs.set(k,{f0:pk.freq,fr:[],tM:0});const o=cs.get(k);o.fr.push({fi,peaks:mt,hC:c});o.tM+=mt.reduce((s,p)=>s+p.mag,0)}}});const gs=[];cs.forEach(c=>{if(c.fr.length>=minF){const fis=c.fr.map(f=>f.fi);gs.push({f0:c.f0,avgMag:c.tM/c.fr.length,fCnt:c.fr.length,fRange:[Math.min(...fis),Math.max(...fis)],cont:c.fr.length/(Math.max(...fis)-Math.min(...fis)+1),frames:c.fr,category:"harmonic"})}});gs.sort((a,b)=>b.avgMag-a.avgMag);const fl=[];for(const g of gs)if(!fl.some(e=>Math.abs(e.f0-g.f0)/g.f0<.1))fl.push(g);return fl}

function detectN(stft,sr,th){const{mag,nF,nB,fs}=stft;const rg=[];for(let b=1;b<nB;b+=2){let s=0,sq=0;for(let f=0;f<nF;f++){s+=mag[f][b];sq+=mag[f][b]**2}const mn=s/nF,v=sq/nF-mn*mn,cv=mn>0?Math.sqrt(Math.max(0,v))/mn:999;if(cv<th&&mn>.0005)rg.push({bin:b,mean:mn,cv,freq:b*sr/fs})}if(!rg.length)return[];const gs=[];let cur={sb:rg[0].bin,eb:rg[0].bin,fr:[rg[0]]};for(let i=1;i<rg.length;i++){if(rg[i].bin-cur.eb<=8){cur.eb=rg[i].bin;cur.fr.push(rg[i])}else{if(cur.fr.length>=4)gs.push(cur);cur={sb:rg[i].bin,eb:rg[i].bin,fr:[rg[i]]}}}if(cur.fr.length>=4)gs.push(cur);return gs.map(g=>({fqR:[g.sb*sr/fs,g.eb*sr/fs],bR:[g.sb,g.eb],avgMag:g.fr.reduce((s,f)=>s+f.mean,0)/g.fr.length,stat:1-g.fr.reduce((s,f)=>s+f.cv,0)/g.fr.length,category:"noise",fRange:[0,nF-1],fCnt:nF}))}

function detectP(stft,ppf){const{nF,hs}=stft;const sr=S.buf.sampleRate;const en=ppf.map(p=>p.reduce((s,pk)=>s+pk.mag,0));const mL=Math.min(Math.floor(nF/2),150);let e0=0;for(const e of en)e0+=e*e;const ac=new Float32Array(mL);for(let l=1;l<mL;l++){let s=0;for(let i=0;i<nF-l;i++)s+=en[i]*en[i+l];ac[l]=s/(e0+1e-10)}const ps=[];for(let i=2;i<mL-1;i++){if(ac[i]>ac[i-1]&&ac[i]>ac[i+1]&&ac[i]>.35){const sec=(i*hs)/sr;if(sec>.1&&sec<5)ps.push({pSec:sec,str:ac[i],category:"pattern",fRange:[0,nF-1],fCnt:nF})}}return ps.slice(0,3)}

function estDir(l,r,fs,hs){if(!r)return null;const win=hWin(fs),nF=Math.floor((l.length-fs)/hs)+1,ds=[];for(let f=0;f<nF;f+=3){const o=f*hs;let lE=0,rE=0;for(let i=0;i<fs;i++){const lv=(l[o+i]||0)*win[i],rv=(r[o+i]||0)*win[i];lE+=lv*lv;rE+=rv*rv}const t=lE+rE;if(t>.0001)ds.push({frame:f,pan:(rE-lE)/t})}return ds}

// Clustering
function cluster(raw,target){if(raw.length<=target)return raw;function sim(a,b){let s=0;if(a.f0&&b.f0){const r=Math.max(a.f0,b.f0)/Math.min(a.f0,b.f0);if(r<1.2)s+=.5;else if(Math.abs(r-Math.round(r))<.08)s+=.3}if(a.fRange&&b.fRange){const os=Math.max(a.fRange[0],b.fRange[0]),oe=Math.min(a.fRange[1],b.fRange[1]),ov=Math.max(0,oe-os),un=Math.max(a.fRange[1],b.fRange[1])-Math.min(a.fRange[0],b.fRange[0]);if(un>0)s+=.3*(ov/un)}if(a.pan!==undefined&&b.pan!==undefined)s+=.2*(1-Math.abs(a.pan-b.pan));if(a.category===b.category)s+=.15;return s}let srcs=[...raw];while(srcs.length>target){let bS=-1,bI=0,bJ=1;for(let i=0;i<srcs.length;i++)for(let j=i+1;j<srcs.length;j++){const v=sim(srcs[i],srcs[j]);if(v>bS){bS=v;bI=i;bJ=j}}if(bS<.1)break;const a=srcs[bI],b=srcs[bJ],m={...a};if(a.f0&&b.f0)m.f0=(a.f0*a.avgMag+b.f0*b.avgMag)/(a.avgMag+b.avgMag);m.avgMag=Math.max(a.avgMag,b.avgMag);m.fRange=[Math.min(a.fRange[0],b.fRange[0]),Math.max(a.fRange[1],b.fRange[1])];m.fCnt=(a.fCnt||0)+(b.fCnt||0);if(a.pan!==undefined&&b.pan!==undefined)m.pan=(a.pan+b.pan)/2;if(a.frames&&b.frames)m.frames=[...a.frames,...b.frames];if(a.bR&&b.bR)m.bR=[Math.min(a.bR[0],b.bR[0]),Math.max(a.bR[1],b.bR[1])];if(a.fqR&&b.fqR)m.fqR=[Math.min(a.fqR[0],b.fqR[0]),Math.max(a.fqR[1],b.fqR[1])];srcs.splice(bJ,1);srcs[bI]=m}return srcs}

// Masks & Resynthesis
function buildMasks(srcs,stft,sr){const{mag,nF,nB,fs}=stft;const masks=srcs.map(()=>Array.from({length:nF},()=>new Float32Array(nB)));for(let f=0;f<nF;f++){for(let b=0;b<nB;b++){let bIdx=-1,bSc=0;srcs.forEach((src,si)=>{let sc=0;if(src.category==="harmonic"&&src.frames){const fr=src.frames.find(x=>x.fi===f);if(fr)for(const pk of fr.peaks)if(Math.abs(pk.bin-b)<=2){sc=.9-Math.abs(pk.bin-b)*.15;break}if(sc===0&&src.f0)for(let h=1;h<=8;h++){const eb=Math.round(src.f0*h*fs/sr);if(Math.abs(eb-b)<=3){sc=.3/h;break}}}else if(src.category==="noise"&&src.bR){if(b>=src.bR[0]&&b<=src.bR[1])sc=.7}if(sc>bSc){bSc=sc;bIdx=si}});if(bIdx>=0&&bSc>.05)masks[bIdx][f][b]=bSc}}const res=Array.from({length:nF},()=>new Float32Array(nB));for(let f=0;f<nF;f++)for(let b=0;b<nB;b++){let t=0;for(let si=0;si<srcs.length;si++)t+=masks[si][f][b];res[f][b]=Math.max(0,1-t)}masks.push(res);return masks}

function resynth(mask,stft,oLen){const mMag=mask.map((fm,f)=>{const m=new Float32Array(fm.length);for(let b=0;b<fm.length;b++)m[b]=stft.mag[f][b]*fm[b];return m});return doISTFT(mMag,stft.ph,stft.fs,stft.hs,oLen)}

function conf(src,w){const wt={h:w.harmonic/100,a:w.amplitude/100,w:w.waveform/100,d:w.direction/100},tot=wt.h+wt.a+wt.w+wt.d;let sc=0;if(src.category==="harmonic"){sc+=wt.h*Math.min(1,(src.frames?.[0]?.hC||3)/6);sc+=wt.a*(src.cont||.5);sc+=wt.w*.4;sc+=wt.d*Math.min(1,Math.abs(src.pan||0)+.3)}else if(src.category==="noise"){sc+=wt.h*.1;sc+=wt.a*(src.stat||.5);sc+=wt.w*.2;sc+=wt.d*.2}else if(src.category==="pattern"){sc+=wt.h*.2;sc+=wt.a*.3;sc+=wt.w*(src.str||.5);sc+=wt.d*.3}return Math.min(1,sc/tot)}

// Pipeline
async function analyze(buf){
  showP(true);setP(0,"STFT解析中...");await tk();
  const sr=buf.sampleRate;S.left=buf.getChannelData(0);S.right=buf.numberOfChannels>1?buf.getChannelData(1):null;
  S.ffts=sr>=88200?4096:2048;S.hop=S.ffts/4;
  setP(8,"STFT解析中...");await tk();
  S.stft=doSTFT(S.left,S.ffts,S.hop);S.stft.sr=sr;
  setP(35,"ピーク検出中...");await tk();
  let aM=0;for(const fr of S.stft.mag){let s=0;for(let i=0;i<fr.length;i++)s+=fr[i];aM+=s/fr.length}aM/=S.stft.nF;
  const ppf=S.stft.mag.map(f=>findPks(f,aM*1.5,sr,S.ffts));
  setP(50,"倍音グループ検出中...");await tk();
  const g=S.gran;
  const hG=detectH(ppf,sr,S.ffts,{tol:.035+(100-g)/800,minH:Math.max(2,Math.floor(5-g/30)),minF:Math.max(3,Math.floor(15-g/10))});
  setP(60,"定常ノイズ検出中...");await tk();
  const nG=detectN(S.stft,sr,.12+(100-g)/300);
  setP(68,"反復パターン検出中...");await tk();
  const pts=detectP(S.stft,ppf);
  setP(72,"方向推定中...");await tk();
  const dir=estDir(S.left,S.right,S.ffts,S.hop);
  const tgt=Math.max(2,Math.min(10,Math.round(2+g/12)));
  setP(76,"クラスタリング中...");await tk();
  let allR=[];
  hG.forEach(h=>{const aP=dir?(()=>{const r=dir.filter(d=>d.frame>=h.fRange[0]&&d.frame<=h.fRange[1]);return r.length>0?r.reduce((s,d)=>s+d.pan,0)/r.length:0})():0;allR.push({...h,pan:aP})});
  nG.forEach(n=>allR.push({...n,pan:0}));
  pts.forEach(p=>allR.push({...p,pan:0}));
  const cl=cluster(allR,tgt);
  setP(82,"マスク生成中...");await tk();
  let ci=0;
  const srcs=cl.map((c,i)=>{const src={...c,id:`s${i}`,color:COLS[ci++%COLS.length],active:true,solo:false};
    if(src.category==="harmonic")src.name=src.f0?`${Math.round(src.f0)}Hz 調波音`:"調波音";
    else if(src.category==="noise")src.name=src.fqR?`${Math.round(src.fqR[0])}-${Math.round(src.fqR[1])}Hz ノイズ`:"定常ノイズ";
    else if(src.category==="pattern")src.name=`${src.pSec?.toFixed(1)||"?"}s 反復`;
    else src.name=`音源 ${i+1}`;
    src.confidence=conf(src,S.w);return src});
  srcs.sort((a,b)=>b.confidence-a.confidence);
  S.sources=srcs;
  S.masks=buildMasks(srcs,S.stft,sr);
  setP(90,"音声再合成中...");await tk();
  const oLen=S.left.length;S.rBufs=[];
  for(let i=0;i<=srcs.length;i++){const pcm=resynth(S.masks[i],S.stft,oLen);const ab=S.actx.createBuffer(1,oLen,sr);ab.copyToChannel(pcm,0);S.rBufs.push(ab);setP(90+Math.round(10*(i+1)/(srcs.length+1)),"音声再合成中...");await tk()}
  setP(100,"完了");await tk();showP(false);
  $('btnEx').style.background='var(--accent)';$('btnEx').style.color='var(--bg)';
  renderAll()
}

// Playback
function togglePlay(){if(!S.buf)return;if(!S.actx)S.actx=new(window.AudioContext||window.webkitAudioContext)();if(S.actx.state==='suspended')S.actx.resume();if(S.playing){stopPB();return}startPB()}
function startPB(){if(!S.rBufs||!S.rBufs.length){const n=S.actx.createBufferSource();n.buffer=S.buf;n.connect(S.actx.destination);n.start();n.onended=()=>{S.playing=false;$('btnPlay').textContent='▶'};S.nodes=[n];S.playing=true;$('btnPlay').textContent='■';return}
  const solo=S.sources.some(s=>s.solo);const ns=[];
  S.sources.forEach((src,i)=>{const play=solo?src.solo:src.active;if(play&&S.rBufs[i]){const n=S.actx.createBufferSource();n.buffer=S.rBufs[i];n.connect(S.actx.destination);ns.push(n)}});
  if(!solo&&S.rBufs[S.sources.length]){const n=S.actx.createBufferSource();n.buffer=S.rBufs[S.sources.length];n.connect(S.actx.destination);ns.push(n)}
  if(!ns.length)return;
  ns.forEach(n=>n.start(0,S.pOff));S.nodes=ns;S.pStart=S.actx.currentTime;S.playing=true;$('btnPlay').textContent='■';
  const dur=S.buf.duration;
  const upd=()=>{if(!S.playing)return;const el=S.actx.currentTime-S.pStart+S.pOff;const pct=Math.min(100,el/dur*100);$('pProg').style.width=pct+'%';$('tTime').textContent=`${el.toFixed(1)}s / ${dur.toFixed(1)}s`;if(el<dur)requestAnimationFrame(upd);else stopPB()};
  requestAnimationFrame(upd);ns[0].onended=()=>{if(S.playing)stopPB()}}
function stopPB(){S.nodes.forEach(n=>{try{n.stop()}catch(e){}});S.playing=false;S.pOff=0;$('btnPlay').textContent='▶';$('pProg').style.width='0%'}
function seekPB(e){const r=$('pBar').getBoundingClientRect();S.pOff=(e.clientX-r.left)/r.width*S.buf.duration;if(S.playing){stopPB();startPB()}}
function restartPB(){if(S.playing){stopPB();startPB()}}

// Export
function exportWAV(){if(!S.rBufs||!S.sources.length)return;const solo=S.sources.some(s=>s.solo);const sr=S.buf.sampleRate,len=S.left.length,mix=new Float32Array(len);
  S.sources.forEach((src,i)=>{const inc=solo?src.solo:src.active;if(inc&&S.rBufs[i]){const d=S.rBufs[i].getChannelData(0);for(let j=0;j<len;j++)mix[j]+=d[j]}});
  if(!solo&&S.rBufs[S.sources.length]){const d=S.rBufs[S.sources.length].getChannelData(0);for(let j=0;j<len;j++)mix[j]+=d[j]}
  const buf=new ArrayBuffer(44+len*2),v=new DataView(buf);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  ws(0,'RIFF');v.setUint32(4,36+len*2,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,len*2,true);
  for(let i=0;i<len;i++){const s=Math.max(-1,Math.min(1,mix[i]));v.setInt16(44+i*2,s<0?s*0x8000:s*0x7FFF,true)}
  const bl=new Blob([buf],{type:'audio/wav'}),u=URL.createObjectURL(bl),a=document.createElement('a');a.href=u;a.download='sound-anatomy-export.wav';a.click();URL.revokeObjectURL(u)}

// Render
function renderAll(){renderSpec();renderSL();renderRad();renderCnt()}
function renderSpec(){const cv=$('specCanvas'),w=cv.parentElement.clientWidth-12,h=150,d=2;cv.width=w*d;cv.height=h*d;cv.style.width=w+'px';cv.style.height=h+'px';const ctx=cv.getContext('2d');ctx.scale(d,d);ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,w,h);
  if(!S.stft){ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('WAVファイルを読み込んでください',w/2,h/2);return}
  const{mag,nF,nB,fs}=S.stft,sr=S.buf.sampleRate,vis=getVis();let mM=0;for(const fr of mag)for(let b=0;b<nB;b++)if(fr[b]>mM)mM=fr[b];
  const mB=Math.min(nB,Math.floor(12000*fs/sr)),fSt=Math.max(1,Math.floor(nF/w)),bSt=Math.max(1,Math.floor(mB/h));
  for(let fi=0;fi<nF;fi+=fSt){const x=(fi/nF)*w,cW=Math.max(1,w/nF*fSt);for(let b=0;b<mB;b+=bSt){const v=mag[fi][b]/(mM+1e-10),dB=20*Math.log10(v+1e-6),n=Math.max(0,Math.min(1,(dB+80)/80));if(n<.015)continue;const y=h-(b/mB)*h,cH=Math.max(1,h/mB*bSt);
    let bS=null,bM=0;if(S.masks){vis.forEach(src=>{if(!src.active)return;const idx=S.sources.indexOf(src);if(idx>=0&&S.masks[idx]&&S.masks[idx][fi]){const m=S.masks[idx][fi][b];if(m>bM){bM=m;bS=src}}})}
    if(bS&&bM>.05){const r=parseInt(bS.color.slice(1,3),16),g=parseInt(bS.color.slice(3,5),16),bl=parseInt(bS.color.slice(5,7),16);ctx.fillStyle=`rgba(${r},${g},${bl},${n*.75*bM})`}else{const vv=Math.floor(n*160);ctx.fillStyle=`rgba(${vv*.3|0},${vv*.5|0},${vv*.7|0},${n*.4})`}
    ctx.fillRect(x,y-cH,cW+.5,cH+.5)}}
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='7px monospace';ctx.textAlign='right';
  [250,500,1000,2000,4000,8000].forEach(f=>{const b=Math.floor(f*fs/sr);if(b<mB){const y=h-(b/mB)*h;ctx.fillText(f>=1000?`${f/1000}k`:`${f}`,w-2,y+3);ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w-18,y);ctx.stroke()}});
  ctx.textAlign='center';const dur=(nF*S.hop)/sr,st=Math.max(1,Math.floor(dur/8));for(let t=0;t<=dur;t+=st)ctx.fillText(`${t}s`,(t/dur)*w,h-2)}

function renderRad(){const svg=$('radar'),c=50,r=36;let h='';[.33,.66,1].forEach(rv=>h+=`<circle cx="${c}" cy="${c}" r="${r*rv}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`);h+=`<line x1="${c}" y1="${c-r}" x2="${c}" y2="${c+r}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/><line x1="${c-r}" y1="${c}" x2="${c+r}" y2="${c}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;h+=`<text x="${c}" y="6" fill="rgba(255,255,255,0.18)" font-size="6" text-anchor="middle" font-family="monospace">L</text><text x="98" y="${c+2}" fill="rgba(255,255,255,0.18)" font-size="6" text-anchor="end" font-family="monospace">R</text>`;
  getVis().filter(s=>s.active&&s.pan!==undefined).forEach((s,i)=>{const x=c+s.pan*r*.8,y=c+Math.sin(i*1.8)*r*.3;h+=`<circle cx="${x}" cy="${y}" r="5" fill="${s.color}" opacity="0.7"/><circle cx="${x}" cy="${y}" r="5" fill="none" stroke="${s.color}" stroke-width="0.7" opacity="0.3"><animate attributeName="r" values="5;11;5" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/></circle>`});svg.innerHTML=h}

function renderSL(){const el=$('sList'),vis=getVis(),cats=['harmonic','pattern','noise'],gd=cats.map(c=>({...CI[c],id:c,sources:vis.filter(s=>s.category===c)})).filter(c=>c.sources.length>0);
  if(!gd.length){el.innerHTML=`<div class="source-empty">${S.stft?'音源が検出されませんでした':'WAVファイルを読み込んでください'}</div>`;return}
  let h='';gd.forEach(cat=>{const op=S.expC[cat.id];h+=`<div class="cat-header" style="background:${cat.c}08;border:1px solid ${cat.c}12" onclick="togCat('${cat.id}')"><span class="cat-arrow ${op?'open':''}" style="color:${cat.c}">▶</span><span class="cat-label" style="color:${cat.c}">${cat.i} ${cat.l}</span><span class="cat-count">${cat.sources.length}</span><button class="btn-cat-all" onclick="event.stopPropagation();togCatAll('${cat.id}')">ALL</button></div>`;
    if(op){h+='<div class="cat-sources">';cat.sources.forEach(s=>{h+=`<div class="source-row ${s.active?'':'inactive'}"><div class="source-dot" style="background:${s.color};opacity:${s.active?1:.2}"></div><span class="source-name">${s.name}</span><div class="confidence-bar"><div class="confidence-fill" style="width:${s.confidence*100}%;background:${s.color}"></div></div><button class="btn-ms" style="background:${s.active?'rgba(255,255,255,0.06)':'rgba(255,107,107,0.15)'};color:${s.active?'rgba(255,255,255,0.3)':'#FF6B6B'}" onclick="event.stopPropagation();togSrc('${s.id}')">M</button><button class="btn-ms" style="background:${s.solo?'rgba(78,205,196,0.15)':'rgba(255,255,255,0.06)'};color:${s.solo?'#4ECDC4':'rgba(255,255,255,0.3)'}" onclick="event.stopPropagation();soloSrc('${s.id}')">S</button></div>`});h+='</div>'}});el.innerHTML=h}

function renderCnt(){const v=getVis();$('sCnt').textContent=v.length>0?`${v.length} 音源`:''}

// Interactions
function getVis(){return S.sources.filter(s=>s.confidence*100>=S.cTh)}
function uGran(v){S.gran=+v;$('gVal').textContent=v+'%';sBg('gSl',v,'var(--accent)')}
function uConf(v){S.cTh=+v;$('cVal').textContent=v+'%';sBg('cSl',v,'var(--purple)');renderAll()}
function uW(id,v){S.w[id]=+v;$(`wv_${id}`).textContent=v+'%';sBg(`ws_${id}`,v,'var(--accent)');S.sources.forEach(s=>s.confidence=conf(s,S.w));renderAll()}
function togCat(id){S.expC[id]=!S.expC[id];renderSL()}
function togCatAll(id){const cs=S.sources.filter(s=>s.category===id);const a=cs.every(s=>s.active);cs.forEach(s=>s.active=!a);restartPB();renderAll()}
function togSrc(id){const s=S.sources.find(s=>s.id===id);if(s)s.active=!s.active;restartPB();renderAll()}
function soloSrc(id){const s=S.sources.find(s=>s.id===id);if(s)s.solo=!s.solo;restartPB();renderAll()}
async function reanalyze(){if(S.buf){$('btnRe').disabled=true;await analyze(S.buf);$('btnRe').disabled=false}}
function sBg(id,p,c){$(id).style.background=`linear-gradient(90deg,${c} ${p}%,rgba(255,255,255,0.06) ${p}%)`}
function showP(s){$('pWrap').classList.toggle('hidden',!s)}
function setP(p,l){$('pFill').style.width=p+'%';$('pLabel').textContent=l||''}
function tk(){return new Promise(r=>setTimeout(r,20))}

// Init
function init(){
  const g=$('pGrid');g.innerHTML=PMS.map(p=>`<div style="background:var(--surface);border-radius:3px;padding:5px 8px;border:1px solid rgba(255,255,255,0.035)"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:8px;color:var(--text-dim)"><span style="opacity:0.4;margin-right:2px">${p.i}</span>${p.l}</span><span style="font-size:7px;color:var(--accent)" id="wv_${p.id}">${S.w[p.id]}%</span></div><input type="range" min="0" max="100" value="${S.w[p.id]}" id="ws_${p.id}" oninput="uW('${p.id}',this.value)"></div>`).join('');
  sBg('gSl',S.gran,'var(--accent)');sBg('cSl',S.cTh,'var(--purple)');PMS.forEach(p=>sBg(`ws_${p.id}`,S.w[p.id],'var(--accent)'));
  renderSpec();renderRad();
  $('fIn').addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;$('fName').textContent=f.name;if(!S.actx)S.actx=new(window.AudioContext||window.webkitAudioContext)();try{const ab=await f.arrayBuffer(),buf=await S.actx.decodeAudioData(ab);S.buf=buf;$('fDur').textContent=buf.duration.toFixed(1)+'s';$('hBadges').innerHTML=`<span class="badge badge-accent">${buf.sampleRate}Hz</span><span class="badge badge-dim">${buf.numberOfChannels===2?'STEREO':'MONO'}</span>`;$('tBar').classList.remove('hidden');$('tTime').textContent=`0.0s / ${buf.duration.toFixed(1)}s`;$('btnRe').disabled=false;await analyze(buf)}catch(err){console.error(err);$('fName').textContent='デコードエラー'}})}
window.addEventListener('DOMContentLoaded',init);
window.addEventListener('resize',()=>{if(S.stft)renderSpec()});
</script>
</body>
