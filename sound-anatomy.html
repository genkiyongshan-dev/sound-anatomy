<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>sound anatomy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #08080d;
    --surface: rgba(255,255,255,0.02);
    --border: rgba(255,255,255,0.04);
    --border-light: rgba(255,255,255,0.06);
    --text: #e0e0e8;
    --text-dim: rgba(255,255,255,0.45);
    --text-faint: rgba(255,255,255,0.25);
    --text-ghost: rgba(255,255,255,0.12);
    --accent: #4ECDC4;
    --accent-dim: rgba(78,205,196,0.1);
    --accent-border: rgba(78,205,196,0.18);
    --purple: #A78BFA;
    --red: #FF6B6B;
    --orange: #F97316;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Menlo', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-light);
    background: var(--surface);
  }
  .header-title { font-size: 13px; font-weight: 700; letter-spacing: 2.5px; color: #fff; }
  .header-badges { display: flex; gap: 5px; }
  .badge {
    font-size: 7px; padding: 2px 5px; border-radius: 2px; letter-spacing: 0.5px;
  }
  .badge-accent { background: var(--accent-dim); color: var(--accent); }
  .badge-dim { background: rgba(255,255,255,0.04); color: var(--text-faint); }

  .file-bar {
    display: flex; align-items: center; padding: 5px 14px; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .file-input { display: none; }
  .btn-file {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim); font-size: 8px; padding: 3px 8px; border-radius: 2px;
    cursor: pointer; font-family: inherit; letter-spacing: 1px;
  }
  .file-name { font-size: 9px; color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-dur { font-size: 8px; color: var(--text-faint); }
  .source-count { font-size: 8px; color: var(--accent); }

  .progress-wrap { padding: 0 14px; }
  .progress-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 0.3s; }
  .progress-label { font-size: 8px; color: var(--text-faint); text-align: center; padding: 4px 0; }

  .spectrogram-wrap { padding: 4px 6px 2px; }
  .spectrogram-wrap canvas { border-radius: 4px; display: block; width: 100%; }

  .transport {
    display: flex; align-items: center; padding: 4px 14px; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .btn-play {
    background: none; border: 1px solid rgba(255,255,255,0.1); color: #fff;
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 8px;
  }
  .transport-bar { flex: 1; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; }
  .transport-time { font-size: 8px; color: var(--text-faint); }

  .section { padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.28); margin-bottom: 6px;
  }

  .control-row { display: flex; gap: 8px; }
  .control-box {
    flex: 1; background: var(--surface); border-radius: 3px;
    padding: 7px 9px; border: 1px solid rgba(255,255,255,0.035);
  }
  .control-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .control-label { font-size: 8px; color: var(--text-dim); }
  .control-value { font-size: 8px; }
  .control-footer { display: flex; justify-content: space-between; margin-top: 2px; }
  .control-hint { font-size: 6px; color: rgba(255,255,255,0.15); }

  input[type="range"] {
    width: 100%; height: 2px; appearance: none; -webkit-appearance: none;
    border-radius: 1px; outline: none; cursor: pointer; background: rgba(255,255,255,0.06);
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; -webkit-appearance: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
  }

  .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .param-box {
    background: var(--surface); border-radius: 3px; padding: 5px 8px;
    border: 1px solid rgba(255,255,255,0.035);
  }
  .param-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .param-label { font-size: 8px; color: var(--text-dim); }
  .param-icon { opacity: 0.4; margin-right: 2px; }
  .param-value { font-size: 7px; color: var(--accent); }

  .analysis-area {
    display: flex; gap: 6px; padding: 8px 10px; border-bottom: 1px solid var(--border);
  }
  .radar-wrap {
    background: rgba(255,255,255,0.015); border-radius: 3px; padding: 4px;
    border: 1px solid rgba(255,255,255,0.035);
    display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
  }
  .source-list-wrap { flex: 1; min-width: 0; max-height: 280px; overflow-y: auto; }
  .source-empty { font-size: 9px; color: var(--text-faint); padding: 8px; text-align: center; }

  .cat-header {
    display: flex; align-items: center; gap: 4px; padding: 3px 6px;
    border-radius: 2px; cursor: pointer; margin-bottom: 1px;
  }
  .cat-arrow { font-size: 7px; opacity: 0.5; transition: transform 0.15s; }
  .cat-arrow.open { transform: rotate(90deg); }
  .cat-icon { font-size: 6px; opacity: 0.4; }
  .cat-label { font-size: 8px; flex: 1; }
  .cat-count { font-size: 7px; color: var(--text-faint); }
  .btn-cat-all {
    background: rgba(255,255,255,0.05); border: none; color: var(--text-faint);
    font-size: 6px; padding: 1px 3px; border-radius: 1px; cursor: pointer; font-family: inherit;
  }

  .cat-sources { padding-left: 8px; margin-top: 1px; }
  .source-row {
    display: flex; align-items: center; gap: 3px; padding: 2px 5px;
    border-radius: 2px; cursor: pointer; transition: all 0.1s;
    border: 1px solid transparent;
  }
  .source-row:hover { background: rgba(255,255,255,0.03); }
  .source-row.selected { border-color: rgba(255,255,255,0.08); }
  .source-row.inactive { opacity: 0.35; }
  .source-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  .source-name { font-size: 8px; color: rgba(255,255,255,0.55); flex: 0 0 auto; min-width: 50px; }
  .confidence-bar { width: 16px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; flex-shrink: 0; }
  .confidence-fill { height: 100%; border-radius: 1px; opacity: 0.45; }
  .btn-ms {
    border: none; font-size: 5px; padding: 1px 2px; border-radius: 1px;
    cursor: pointer; font-family: inherit;
  }

  .actions { display: flex; gap: 8px; padding: 10px 14px; }
  .btn-reanalyze {
    flex: 1; padding: 8px; background: var(--accent-dim);
    border: 1px solid var(--accent-border); color: var(--accent);
    border-radius: 3px; cursor: pointer; font-size: 9px;
    font-family: inherit; letter-spacing: 1.5px; font-weight: 600;
  }
  .btn-reanalyze:disabled { color: rgba(78,205,196,0.3); cursor: default; }
  .btn-export {
    flex: 1; padding: 8px; background: var(--accent); border: none; color: var(--bg);
    border-radius: 3px; cursor: pointer; font-size: 9px;
    font-family: inherit; letter-spacing: 1.5px; font-weight: 700;
  }
  .btn-export.disabled { background: rgba(78,205,196,0.15); color: rgba(78,205,196,0.4); cursor: default; }

  .status {
    padding: 3px 14px 6px; display: flex; justify-content: space-between;
  }
  .status span { font-size: 7px; letter-spacing: 1px; }
  .status-left { color: var(--text-ghost); }
  .status-right { color: rgba(255,255,255,0.08); }

  .hidden { display: none; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-title">sound anatomy</span>
  <div class="header-badges" id="headerBadges"></div>
</div>

<!-- FILE BAR -->
<div class="file-bar">
  <input type="file" id="fileInput" class="file-input" accept=".wav,.mp3,.ogg,.flac,.m4a,.aac">
  <button class="btn-file" onclick="document.getElementById('fileInput').click()">ファイル選択</button>
  <span class="file-name" id="fileName"></span>
  <span class="file-dur" id="fileDur"></span>
  <span class="source-count" id="sourceCount"></span>
</div>

<!-- PROGRESS -->
<div class="progress-wrap hidden" id="progressWrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<!-- SPECTROGRAM -->
<div class="spectrogram-wrap">
  <canvas id="specCanvas"></canvas>
</div>

<!-- TRANSPORT -->
<div class="transport hidden" id="transportBar">
  <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
  <div class="transport-bar"></div>
  <span class="transport-time" id="transportTime"></span>
</div>

<!-- GRANULARITY + CONFIDENCE -->
<div class="section">
  <div class="section-label">分離制御</div>
  <div class="control-row">
    <div class="control-box">
      <div class="control-header">
        <span class="control-label">分離の細かさ</span>
        <span class="control-value" style="color:var(--accent)" id="granVal">50%</span>
      </div>
      <input type="range" min="5" max="100" value="50" id="granSlider" oninput="updateGranularity(this.value)">
      <div class="control-footer">
        <span class="control-hint">粗い</span><span class="control-hint">細かい</span>
      </div>
    </div>
    <div class="control-box">
      <div class="control-header">
        <span class="control-label">信頼度しきい値</span>
        <span class="control-value" style="color:var(--purple)" id="confVal">20%</span>
      </div>
      <input type="range" min="0" max="90" value="20" id="confSlider" oninput="updateConfidence(this.value)">
      <div class="control-footer">
        <span class="control-hint">全表示</span><span class="control-hint">高信頼のみ</span>
      </div>
    </div>
  </div>
</div>

<!-- ANALYSIS PARAMS -->
<div class="section">
  <div class="section-label">解析パラメータ</div>
  <div class="params-grid" id="paramsGrid"></div>
</div>

<!-- DIRECTION + SOURCES -->
<div class="analysis-area">
  <div class="radar-wrap">
    <div class="section-label" style="margin-bottom:2px">方向</div>
    <svg id="radarSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
  </div>
  <div class="source-list-wrap">
    <div class="section-label">音源グループ</div>
    <div id="sourceList"></div>
  </div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <button class="btn-reanalyze" id="btnReanalyze" onclick="reanalyze()" disabled>再解析</button>
  <button class="btn-export disabled" id="btnExport">WAV書き出し</button>
</div>

<!-- STATUS -->
<div class="status">
  <span class="status-left">sound anatomy — 音源構造分離</span>
  <span class="status-right">v0.1</span>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const STATE = {
  audioBuffer: null,
  audioCtx: null,
  sourceNode: null,
  stftData: null,
  sources: [],
  weights: { harmonic: 80, amplitude: 60, waveform: 50, direction: 70 },
  granularity: 50,
  confidenceThreshold: 20,
  expandedCats: { harmonic: true, pattern: true, noise: true, unclassified: true },
  selectedSource: null,
  playing: false,
};

const COLORS = ["#4ECDC4","#FF6B6B","#FFE66D","#A78BFA","#F97316","#36B5A0","#FF8E72","#8B7AE0","#FB923C","#EC4899","#06B6D4","#84CC16"];
const CAT_INFO = {
  harmonic: { label: "調波音", icon: "≋", color: "#4ECDC4" },
  pattern: { label: "反復パターン", icon: "∿", color: "#FF6B6B" },
  noise: { label: "定常ノイズ", icon: "░", color: "#A78BFA" },
  unclassified: { label: "未分類", icon: "?", color: "#F97316" },
};
const PARAMS = [
  { id: "harmonic", label: "倍音構造", icon: "≋" },
  { id: "amplitude", label: "音量パターン", icon: "▲" },
  { id: "waveform", label: "波形反復", icon: "∿" },
  { id: "direction", label: "方向性", icon: "◎" },
];

// ============================================================
// DSP ENGINE
// ============================================================
function hannWindow(N) {
  const w = new Float32Array(N);
  for (let i = 0; i < N; i++) w[i] = 0.5 * (1 - Math.cos(2 * Math.PI * i / (N - 1)));
  return w;
}

function fft(re, im) {
  const N = re.length;
  if (N <= 1) return;
  const hN = N / 2;
  const reE = new Float32Array(hN), imE = new Float32Array(hN);
  const reO = new Float32Array(hN), imO = new Float32Array(hN);
  for (let i = 0; i < hN; i++) {
    reE[i] = re[2*i]; imE[i] = im[2*i];
    reO[i] = re[2*i+1]; imO[i] = im[2*i+1];
  }
  fft(reE, imE); fft(reO, imO);
  for (let k = 0; k < hN; k++) {
    const a = -2 * Math.PI * k / N;
    const c = Math.cos(a), s = Math.sin(a);
    const tR = c * reO[k] - s * imO[k];
    const tI = c * imO[k] + s * reO[k];
    re[k] = reE[k] + tR; im[k] = imE[k] + tI;
    re[k+hN] = reE[k] - tR; im[k+hN] = imE[k] - tI;
  }
}

function computeSTFT(samples, fftSize, hopSize, sampleRate) {
  const win = hannWindow(fftSize);
  const numFrames = Math.floor((samples.length - fftSize) / hopSize) + 1;
  const numBins = fftSize / 2 + 1;
  const magnitude = [], phase = [];
  for (let f = 0; f < numFrames; f++) {
    const off = f * hopSize;
    const re = new Float32Array(fftSize), im = new Float32Array(fftSize);
    for (let i = 0; i < fftSize; i++) { re[i] = (samples[off+i]||0) * win[i]; im[i] = 0; }
    fft(re, im);
    const mag = new Float32Array(numBins), ph = new Float32Array(numBins);
    for (let i = 0; i < numBins; i++) {
      mag[i] = Math.sqrt(re[i]*re[i] + im[i]*im[i]);
      ph[i] = Math.atan2(im[i], re[i]);
    }
    magnitude.push(mag); phase.push(ph);
  }
  return { magnitude, phase, numFrames, numBins, sampleRate, fftSize, hopSize };
}

function findPeaks(magFrame, threshold, sampleRate, fftSize) {
  const peaks = [], N = magFrame.length;
  for (let i = 2; i < N - 2; i++) {
    if (magFrame[i] > threshold && magFrame[i] > magFrame[i-1] && magFrame[i] > magFrame[i+1]
        && magFrame[i] > magFrame[i-2] && magFrame[i] > magFrame[i+2]) {
      const a = Math.log(magFrame[i-1]+1e-10), b = Math.log(magFrame[i]+1e-10), g = Math.log(magFrame[i+1]+1e-10);
      const p = 0.5 * (a - g) / (a - 2*b + g);
      peaks.push({ bin: i, freq: ((i+p)*sampleRate)/fftSize, mag: magFrame[i] });
    }
  }
  peaks.sort((a,b) => b.mag - a.mag);
  return peaks.slice(0, 40);
}

function detectHarmonicGroups(peaksPerFrame, params) {
  const { harmonicTolerance = 0.04, minHarmonics = 3, minFrames = 5 } = params;
  const candidates = new Map();
  peaksPerFrame.forEach((peaks, fi) => {
    for (const pk of peaks) {
      const f0 = pk.freq;
      if (f0 < 60 || f0 > 4000) continue;
      let hCount = 1; const matched = [pk];
      for (let h = 2; h <= 10; h++) {
        const exp = f0 * h;
        const m = peaks.find(p => Math.abs(p.freq - exp)/exp < harmonicTolerance);
        if (m) { hCount++; matched.push(m); }
      }
      if (hCount >= minHarmonics) {
        const key = Math.round(f0/5)*5;
        if (!candidates.has(key)) candidates.set(key, { f0, frames: [], totalMag: 0 });
        const c = candidates.get(key);
        c.frames.push({ frameIdx: fi, peaks: matched, harmonicCount: hCount });
        c.totalMag += matched.reduce((s,p) => s + p.mag, 0);
      }
    }
  });
  const groups = [];
  candidates.forEach(c => {
    if (c.frames.length >= minFrames) {
      const fis = c.frames.map(f => f.frameIdx);
      const mn = Math.min(...fis), mx = Math.max(...fis);
      groups.push({
        f0: c.f0, avgMag: c.totalMag / c.frames.length,
        frameCount: c.frames.length, frameRange: [mn, mx],
        continuity: c.frames.length / (mx - mn + 1),
        frames: c.frames, category: "harmonic",
      });
    }
  });
  groups.sort((a,b) => b.avgMag - a.avgMag);
  const filtered = [];
  for (const g of groups) {
    if (!filtered.some(e => Math.abs(e.f0 - g.f0)/g.f0 < 0.08)) filtered.push(g);
  }
  return filtered;
}

function detectStationaryNoise(stft, threshold) {
  const { magnitude, numFrames, numBins, sampleRate, fftSize } = stft;
  const regions = [];
  for (let bin = 1; bin < numBins; bin += 3) {
    let sum = 0, sumSq = 0;
    for (let f = 0; f < numFrames; f++) { sum += magnitude[f][bin]; sumSq += magnitude[f][bin]**2; }
    const mean = sum / numFrames;
    const v = sumSq / numFrames - mean*mean;
    const cv = mean > 0 ? Math.sqrt(v)/mean : 999;
    if (cv < threshold && mean > 0.001) regions.push({ bin, mean, cv, freq: (bin*sampleRate)/fftSize });
  }
  if (!regions.length) return [];
  const groups = [];
  let cur = { startBin: regions[0].bin, endBin: regions[0].bin, freqs: [regions[0]] };
  for (let i = 1; i < regions.length; i++) {
    if (regions[i].bin - cur.endBin <= 6) { cur.endBin = regions[i].bin; cur.freqs.push(regions[i]); }
    else { if (cur.freqs.length >= 3) groups.push(cur); cur = { startBin: regions[i].bin, endBin: regions[i].bin, freqs: [regions[i]] }; }
  }
  if (cur.freqs.length >= 3) groups.push(cur);
  return groups.map(ng => ({
    freqRange: [(ng.startBin*sampleRate)/fftSize, (ng.endBin*sampleRate)/fftSize],
    avgMag: ng.freqs.reduce((s,f) => s+f.mean, 0)/ng.freqs.length,
    stationarity: 1 - ng.freqs.reduce((s,f) => s+f.cv, 0)/ng.freqs.length,
    category: "noise", frameRange: [0, numFrames-1], frameCount: numFrames,
  }));
}

function detectRepetitivePatterns(stft, peaksPerFrame) {
  const { numFrames, hopSize, sampleRate } = stft;
  const energy = peaksPerFrame.map(p => p.reduce((s,pk) => s+pk.mag, 0));
  const maxLag = Math.min(Math.floor(numFrames/2), 200);
  const acf = new Float32Array(maxLag);
  let e0 = 0;
  for (let i = 0; i < numFrames; i++) e0 += energy[i]**2;
  for (let lag = 1; lag < maxLag; lag++) {
    let sum = 0;
    for (let i = 0; i < numFrames - lag; i++) sum += energy[i]*energy[i+lag];
    acf[lag] = sum / (e0 + 1e-10);
  }
  const patterns = [];
  for (let i = 2; i < maxLag - 1; i++) {
    if (acf[i] > acf[i-1] && acf[i] > acf[i+1] && acf[i] > 0.3) {
      const sec = (i * hopSize) / sampleRate;
      if (sec > 0.05 && sec < 5.0) {
        patterns.push({ periodFrames: i, periodSec: sec, strength: acf[i], category: "pattern", frameRange: [0, numFrames-1], frameCount: numFrames });
      }
    }
  }
  return patterns.slice(0, 5);
}

function estimateStereoDirection(left, right, fftSize, hopSize) {
  if (!right) return null;
  const win = hannWindow(fftSize);
  const numFrames = Math.floor((left.length - fftSize) / hopSize) + 1;
  const dirs = [];
  for (let f = 0; f < numFrames; f += 4) {
    const off = f * hopSize;
    let lE = 0, rE = 0;
    for (let i = 0; i < fftSize; i++) {
      const l = (left[off+i]||0)*win[i], r = (right[off+i]||0)*win[i];
      lE += l*l; rE += r*r;
    }
    const tot = lE + rE;
    if (tot > 0.0001) dirs.push({ frame: f, pan: (rE - lE)/tot });
  }
  return dirs;
}

function computeConfidence(src, weights) {
  const w = { h: weights.harmonic/100, a: weights.amplitude/100, w: weights.waveform/100, d: weights.direction/100 };
  const total = w.h + w.a + w.w + w.d;
  let score = 0;
  if (src.category === "harmonic") {
    score += w.h * Math.min(1, (src.frames?.[0]?.harmonicCount||3)/6);
    score += w.a * (src.continuity||0.5);
    score += w.w * 0.4;
    score += w.d * (src.dirConf||0.3);
  } else if (src.category === "noise") {
    score += w.h * 0.1; score += w.a * (src.stationarity||0.5);
    score += w.w * 0.2; score += w.d * 0.2;
  } else if (src.category === "pattern") {
    score += w.h * 0.2; score += w.a * 0.3;
    score += w.w * (src.strength||0.5); score += w.d * 0.3;
  }
  return Math.min(1, score / total);
}

// ============================================================
// ANALYSIS PIPELINE
// ============================================================
async function analyze(buffer) {
  showProgress(true);
  setProgress(0, "STFT解析中...");
  await tick();

  const sr = buffer.sampleRate;
  const left = buffer.getChannelData(0);
  const right = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : null;
  const fftSize = sr >= 88200 ? 4096 : 2048;
  const hopSize = fftSize / 4;

  setProgress(10, "STFT解析中...");
  await tick();

  STATE.stftData = computeSTFT(left, fftSize, hopSize, sr);
  setProgress(40, "ピーク検出中...");
  await tick();

  const stft = STATE.stftData;
  let avgMag = 0;
  for (const frame of stft.magnitude) {
    let s = 0; for (let i = 0; i < frame.length; i++) s += frame[i];
    avgMag += s / frame.length;
  }
  avgMag /= stft.numFrames;
  const peakTh = avgMag * 2;
  const peaksPerFrame = stft.magnitude.map(f => findPeaks(f, peakTh, sr, fftSize));

  setProgress(55, "倍音グループ検出中...");
  await tick();

  const gran = STATE.granularity;
  const hGroups = detectHarmonicGroups(peaksPerFrame, {
    harmonicTolerance: 0.03 + (100 - gran)/1000,
    minHarmonics: Math.max(2, Math.floor(6 - gran/25)),
    minFrames: Math.max(3, Math.floor(20 - gran/8)),
  });

  setProgress(70, "定常ノイズ検出中...");
  await tick();

  const nGroups = detectStationaryNoise(stft, 0.1 + (100 - gran)/400);

  setProgress(80, "反復パターン検出中...");
  await tick();

  const patterns = detectRepetitivePatterns(stft, peaksPerFrame);

  setProgress(85, "方向推定中...");
  await tick();

  const dirData = estimateStereoDirection(left, right, fftSize, hopSize);

  setProgress(90, "音源構築中...");
  await tick();

  let ci = 0;
  const sources = [];

  hGroups.forEach((hg, i) => {
    const avgPan = dirData ? (() => {
      const rel = dirData.filter(d => d.frame >= hg.frameRange[0] && d.frame <= hg.frameRange[1]);
      return rel.length > 0 ? rel.reduce((s,d) => s+d.pan, 0)/rel.length : 0;
    })() : 0;
    const src = { id: `h${i}`, name: `${Math.round(hg.f0)}Hz`, color: COLORS[ci++%COLORS.length],
      active: true, solo: false, category: "harmonic", pan: avgPan,
      _data: hg, dirConf: Math.abs(avgPan), ...hg };
    src.confidence = computeConfidence(src, STATE.weights);
    sources.push(src);
  });

  nGroups.forEach((ng, i) => {
    const src = { id: `n${i}`, name: `${Math.round(ng.freqRange[0])}-${Math.round(ng.freqRange[1])}Hz`,
      color: COLORS[ci++%COLORS.length], active: true, solo: false, category: "noise",
      pan: 0, _data: ng, ...ng };
    src.confidence = computeConfidence(src, STATE.weights);
    sources.push(src);
  });

  patterns.forEach((pt, i) => {
    const src = { id: `p${i}`, name: `${pt.periodSec.toFixed(2)}s周期`,
      color: COLORS[ci++%COLORS.length], active: true, solo: false, category: "pattern",
      pan: 0, _data: pt, ...pt };
    src.confidence = computeConfidence(src, STATE.weights);
    sources.push(src);
  });

  sources.sort((a,b) => b.confidence - a.confidence);
  STATE.sources = sources;

  setProgress(100, "完了");
  await tick();
  showProgress(false);

  renderAll();
}

// ============================================================
// RENDERING
// ============================================================
function renderAll() {
  renderSpectrogram();
  renderSourceList();
  renderRadar();
  renderSourceCount();
}

function renderSpectrogram() {
  const canvas = document.getElementById('specCanvas');
  const container = canvas.parentElement;
  const w = container.clientWidth - 12;
  const h = 150;
  const dpr = 2;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);

  const stft = STATE.stftData;
  if (!stft) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WAVファイルを読み込んでください', w/2, h/2);
    return;
  }

  const { magnitude, numFrames, numBins, sampleRate, fftSize } = stft;
  const visible = getVisibleSources();

  let maxMag = 0;
  for (const frame of magnitude) for (let b = 0; b < numBins; b++) if (frame[b] > maxMag) maxMag = frame[b];

  const maxFreqBin = Math.min(numBins, Math.floor(12000*fftSize/sampleRate));

  // Build source bin lookup for faster rendering
  const sourceBinMap = new Map();
  for (const src of visible) {
    if (!src.active) continue;
    if (src.category === 'harmonic' && src._data?.frames) {
      for (const fr of src._data.frames) {
        for (const pk of fr.peaks) {
          const key = `${fr.frameIdx}_${pk.bin}`;
          sourceBinMap.set(key, src.color);
          // also set adjacent bins
          sourceBinMap.set(`${fr.frameIdx}_${pk.bin-1}`, src.color);
          sourceBinMap.set(`${fr.frameIdx}_${pk.bin+1}`, src.color);
        }
      }
    } else if (src.category === 'noise' && src._data) {
      const sb = Math.floor(src._data.freqRange[0]*fftSize/sampleRate);
      const eb = Math.ceil(src._data.freqRange[1]*fftSize/sampleRate);
      src._binRange = [sb, eb];
    }
  }

  const noiseSources = visible.filter(s => s.active && s.category === 'noise' && s._binRange);

  // Render - sample for performance
  const frameStep = Math.max(1, Math.floor(numFrames / w));
  const binStep = Math.max(1, Math.floor(maxFreqBin / h));

  for (let fi = 0; fi < numFrames; fi += frameStep) {
    const x = (fi / numFrames) * w;
    const cellW = Math.max(1, w / numFrames * frameStep);
    for (let b = 0; b < maxFreqBin; b += binStep) {
      const val = magnitude[fi][b] / (maxMag + 1e-10);
      const dB = 20 * Math.log10(val + 1e-6);
      const norm = Math.max(0, Math.min(1, (dB + 80) / 80));
      if (norm < 0.015) continue;

      const y = h - (b / maxFreqBin) * h;
      const cellH = Math.max(1, h / maxFreqBin * binStep);

      // Check source membership
      const hKey = `${fi}_${b}`;
      let color = sourceBinMap.get(hKey);
      if (!color) {
        for (const ns of noiseSources) {
          if (b >= ns._binRange[0] && b <= ns._binRange[1]) { color = ns.color; break; }
        }
      }

      if (color) {
        const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), bl = parseInt(color.slice(5,7),16);
        ctx.fillStyle = `rgba(${r},${g},${bl},${norm*0.8})`;
      } else {
        const v = Math.floor(norm * 180);
        ctx.fillStyle = `rgba(${v*0.4|0},${v*0.6|0},${v*0.8|0},${norm*0.5})`;
      }
      ctx.fillRect(x, y - cellH, cellW + 0.5, cellH + 0.5);
    }
  }

  // Axes
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  [125,250,500,1000,2000,4000,8000].forEach(freq => {
    const bin = Math.floor(freq*fftSize/sampleRate);
    if (bin < maxFreqBin) {
      const y = h - (bin/maxFreqBin)*h;
      ctx.fillText(freq>=1000 ? `${freq/1000}k` : `${freq}`, w-2, y+3);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w-18,y); ctx.stroke();
    }
  });
  ctx.textAlign = 'center';
  const dur = (numFrames * stft.hopSize) / sampleRate;
  const step = Math.max(1, Math.floor(dur/8));
  for (let t = 0; t <= dur; t += step) {
    ctx.fillText(`${t}s`, (t/dur)*w, h-2);
  }
}

function renderRadar() {
  const svg = document.getElementById('radarSvg');
  const c = 50, r = 36;
  let html = '';
  // Circles
  [0.33,0.66,1].forEach(rv => {
    html += `<circle cx="${c}" cy="${c}" r="${r*rv}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
  });
  // Cross
  html += `<line x1="${c}" y1="${c-r}" x2="${c}" y2="${c+r}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
  html += `<line x1="${c-r}" y1="${c}" x2="${c+r}" y2="${c}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
  // Labels
  html += `<text x="${c}" y="6" fill="rgba(255,255,255,0.18)" font-size="6" text-anchor="middle" font-family="monospace">L</text>`;
  html += `<text x="98" y="${c+2}" fill="rgba(255,255,255,0.18)" font-size="6" text-anchor="end" font-family="monospace">R</text>`;
  // Sources
  const visible = getVisibleSources();
  visible.filter(s => s.active && s.pan !== undefined).forEach((s, i) => {
    const x = c + s.pan * r * 0.8;
    const y = c + Math.sin(i * 1.8) * r * 0.3;
    html += `<circle cx="${x}" cy="${y}" r="4" fill="${s.color}" opacity="0.7"/>`;
    html += `<circle cx="${x}" cy="${y}" r="4" fill="none" stroke="${s.color}" stroke-width="0.7" opacity="0.3">
      <animate attributeName="r" values="4;9;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>`;
  });
  svg.innerHTML = html;
}

function renderSourceList() {
  const container = document.getElementById('sourceList');
  const visible = getVisibleSources();
  const cats = ['harmonic','pattern','noise','unclassified'];
  const grouped = cats.map(c => ({
    ...CAT_INFO[c], id: c,
    sources: visible.filter(s => s.category === c)
  })).filter(c => c.sources.length > 0);

  if (grouped.length === 0) {
    container.innerHTML = `<div class="source-empty">${STATE.stftData ? '音源が検出されませんでした' : 'WAVファイルを読み込んでください'}</div>`;
    return;
  }

  let html = '';
  grouped.forEach(cat => {
    const open = STATE.expandedCats[cat.id];
    html += `<div class="cat-header" style="background:${cat.color}06;border:1px solid ${cat.color}10" onclick="toggleCat('${cat.id}')">
      <span class="cat-arrow ${open?'open':''}" style="color:${cat.color}">▶</span>
      <span class="cat-icon" style="color:${cat.color}">${cat.icon}</span>
      <span class="cat-label" style="color:${cat.color}">${cat.label}</span>
      <span class="cat-count">${cat.sources.length}</span>
      <button class="btn-cat-all" onclick="event.stopPropagation();toggleCatAll('${cat.id}')">ALL</button>
    </div>`;

    if (open) {
      html += '<div class="cat-sources">';
      cat.sources.forEach(s => {
        const sel = STATE.selectedSource === s.id;
        html += `<div class="source-row ${sel?'selected':''} ${s.active?'':'inactive'}"
          onclick="selectSource('${s.id}')" style="${sel?`background:${s.color}0a;border-color:${s.color}18`:''}">
          <div class="source-dot" style="background:${s.color};opacity:${s.active?0.85:0.2}"></div>
          <span class="source-name">${s.name}</span>
          <svg width="48" height="16" style="flex-shrink:0"><polyline points="${makeEnvelope(s.category)}" fill="none" stroke="${s.color}" stroke-width="0.7" opacity="0.45"/></svg>
          <div class="confidence-bar"><div class="confidence-fill" style="width:${s.confidence*100}%;background:${s.color}"></div></div>
          <button class="btn-ms" style="background:${s.active?'rgba(255,255,255,0.05)':'rgba(255,107,107,0.12)'};color:${s.active?'rgba(255,255,255,0.25)':'#FF6B6B'}" onclick="event.stopPropagation();toggleSource('${s.id}')">M</button>
          <button class="btn-ms" style="background:${s.solo?'rgba(78,205,196,0.12)':'rgba(255,255,255,0.05)'};color:${s.solo?'#4ECDC4':'rgba(255,255,255,0.25)'}" onclick="event.stopPropagation();soloSource('${s.id}')">S</button>
        </div>`;
      });
      html += '</div>';
    }
  });
  container.innerHTML = html;
}

function renderSourceCount() {
  const visible = getVisibleSources();
  document.getElementById('sourceCount').textContent = visible.length > 0 ? `${visible.length} 音源` : '';
}

function makeEnvelope(category) {
  const w = 48, h = 16, pts = [];
  for (let i = 0; i < w; i++) {
    let y;
    if (category === 'harmonic') y = h/2 + Math.sin(i*0.15)*h*0.3*(Math.sin(i*0.01)*0.5+0.5);
    else if (category === 'pattern') y = h/2 + Math.sin(i*0.4)*h*0.3*(i%18<10?1:0.1);
    else y = h/2 + (Math.random()-0.5)*h*0.3;
    pts.push(`${i},${y.toFixed(1)}`);
  }
  return pts.join(' ');
}

// ============================================================
// UI INTERACTIONS
// ============================================================
function getVisibleSources() {
  return STATE.sources.filter(s => s.confidence * 100 >= STATE.confidenceThreshold);
}

function updateGranularity(v) {
  STATE.granularity = Number(v);
  document.getElementById('granVal').textContent = v + '%';
  updateSliderBg('granSlider', v, 'var(--accent)');
}

function updateConfidence(v) {
  STATE.confidenceThreshold = Number(v);
  document.getElementById('confVal').textContent = v + '%';
  updateSliderBg('confSlider', v, 'var(--purple)');
  renderSourceList();
  renderSpectrogram();
  renderRadar();
  renderSourceCount();
}

function updateSliderBg(id, pct, color) {
  const el = document.getElementById(id);
  el.style.background = `linear-gradient(90deg,${color} ${pct}%,rgba(255,255,255,0.06) ${pct}%)`;
}

function updateWeight(id, v) {
  STATE.weights[id] = Number(v);
  document.getElementById(`wv_${id}`).textContent = v + '%';
  updateSliderBg(`ws_${id}`, v, 'var(--accent)');
  // Recalculate confidences
  STATE.sources.forEach(s => { s.confidence = computeConfidence(s, STATE.weights); });
  renderSourceList();
  renderRadar();
  renderSourceCount();
}

function toggleCat(catId) {
  STATE.expandedCats[catId] = !STATE.expandedCats[catId];
  renderSourceList();
}

function toggleCatAll(catId) {
  const catSrcs = STATE.sources.filter(s => s.category === catId);
  const allOn = catSrcs.every(s => s.active);
  STATE.sources.forEach(s => { if (s.category === catId) s.active = !allOn; });
  renderAll();
}

function selectSource(id) {
  STATE.selectedSource = STATE.selectedSource === id ? null : id;
  renderSourceList();
}

function toggleSource(id) {
  const s = STATE.sources.find(s => s.id === id);
  if (s) s.active = !s.active;
  renderAll();
}

function soloSource(id) {
  const s = STATE.sources.find(s => s.id === id);
  if (s) s.solo = !s.solo;
  renderSourceList();
}

function togglePlay() {
  if (!STATE.audioBuffer) return;
  if (!STATE.audioCtx) STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const actx = STATE.audioCtx;
  if (actx.state === 'suspended') actx.resume();

  if (STATE.playing) {
    STATE.sourceNode?.stop();
    STATE.playing = false;
    document.getElementById('btnPlay').textContent = '▶';
    return;
  }
  const src = actx.createBufferSource();
  src.buffer = STATE.audioBuffer;
  src.connect(actx.destination);
  src.start();
  src.onended = () => { STATE.playing = false; document.getElementById('btnPlay').textContent = '▶'; };
  STATE.sourceNode = src;
  STATE.playing = true;
  document.getElementById('btnPlay').textContent = '■';
}

async function reanalyze() {
  if (STATE.audioBuffer) {
    document.getElementById('btnReanalyze').disabled = true;
    await analyze(STATE.audioBuffer);
    document.getElementById('btnReanalyze').disabled = false;
  }
}

function showProgress(show) {
  document.getElementById('progressWrap').classList.toggle('hidden', !show);
}

function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label || '';
}

function tick() { return new Promise(r => setTimeout(r, 30)); }

// ============================================================
// INIT
// ============================================================
function init() {
  // Render params grid
  const grid = document.getElementById('paramsGrid');
  grid.innerHTML = PARAMS.map(p => `
    <div class="param-box">
      <div class="param-header">
        <span class="param-label"><span class="param-icon">${p.icon}</span>${p.label}</span>
        <span class="param-value" id="wv_${p.id}">${STATE.weights[p.id]}%</span>
      </div>
      <input type="range" min="0" max="100" value="${STATE.weights[p.id]}" id="ws_${p.id}"
        oninput="updateWeight('${p.id}', this.value)">
    </div>
  `).join('');

  // Init slider backgrounds
  updateSliderBg('granSlider', STATE.granularity, 'var(--accent)');
  updateSliderBg('confSlider', STATE.confidenceThreshold, 'var(--purple)');
  PARAMS.forEach(p => updateSliderBg(`ws_${p.id}`, STATE.weights[p.id], 'var(--accent)'));

  // Init spectrogram
  renderSpectrogram();
  renderRadar();

  // File input handler
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileDur').textContent = '';
    document.getElementById('headerBadges').innerHTML = '';

    if (!STATE.audioCtx) STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    try {
      const arrayBuffer = await file.arrayBuffer();
      const buffer = await STATE.audioCtx.decodeAudioData(arrayBuffer);
      STATE.audioBuffer = buffer;

      document.getElementById('fileDur').textContent = buffer.duration.toFixed(1) + 's';
      document.getElementById('headerBadges').innerHTML = `
        <span class="badge badge-accent">32bit/${buffer.sampleRate}Hz</span>
        <span class="badge badge-dim">${buffer.numberOfChannels === 2 ? 'STEREO' : 'MONO'}</span>
      `;
      document.getElementById('transportBar').classList.remove('hidden');
      document.getElementById('transportTime').textContent = buffer.duration.toFixed(1) + 's';
      document.getElementById('btnReanalyze').disabled = false;

      await analyze(buffer);
    } catch (err) {
      console.error('Audio decode error:', err);
      document.getElementById('fileName').textContent = 'デコードエラー';
    }
  });
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => { if (STATE.stftData) renderSpectrogram(); });
</script>
</body>
</html>
